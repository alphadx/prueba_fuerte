{% extends "base.html" %}
{% block title %}Ajuste de Stock{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header">
                <h4 class="mb-0"><i class="bi bi-arrows-vertical"></i> Ajuste de Stock</h4>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <strong>{{ producto.nombre }}</strong> &mdash; <code>{{ producto.codigo }}</code><br>
                    Stock actual: <strong>{{ producto.stock_actual }} {{ producto.unidad_medida }}</strong>
                </div>

                <form method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tipo de Ajuste</label>
                        <select name="tipo" class="form-select" id="tipoAjuste">
                            <option value="entrada">Entrada (agregar stock)</option>
                            <option value="salida">Salida (retirar stock)</option>
                            <option value="ajuste">Ajuste directo (establecer valor)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" id="lblCantidad">Cantidad a agregar</label>
                        <input type="number" name="cantidad" class="form-control" min="1" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Motivo / Observación</label>
                        <input type="text" name="motivo" class="form-control" maxlength="255"
                               placeholder="Ej: Compra proveedor, merma, devolución...">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-check-circle"></i> Aplicar
                        </button>
                        <a href="{{ url_for('inventario.lista_productos') }}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('tipoAjuste').addEventListener('change', function() {
    const labels = {
        entrada: 'Cantidad a agregar',
        salida: 'Cantidad a retirar',
        ajuste: 'Nuevo stock (valor absoluto)'
    };
    document.getElementById('lblCantidad').textContent = labels[this.value] || 'Cantidad';
});
</script>
{% endblock %}
